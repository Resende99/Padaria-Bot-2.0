<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 { color: #e2b96f; font-size: 1.5rem; margin-bottom: 8px; text-align: center; }
  p  { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 28px; }
  label { color: #ccc; font-size: 0.85rem; display: block; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; padding: 12px 14px;
    background: #0f3460; border: 1px solid #2a4a7f;
    border-radius: 8px; color: #fff; font-size: 1rem;
    outline: none; margin-bottom: 20px;
  }
  input[type=password]:focus { border-color: #e2b96f; }
  button {
    width: 100%; padding: 13px;
    background: #e2b96f; color: #1a1a2e;
    border: none; border-radius: 8px;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #f0cc88; }
  .erro { color: #ff6b6b; font-size: 0.85rem; text-align: center; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>🍞 Padaria Admin</h1>
  <p>Área restrita — insira a senha para continuar</p>
  {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
  <form method="POST" action="/admin/login">
    <label>Senha</label>
    <input type="password" name="senha" placeholder="••••••••" autofocus>
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
