<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Padaria-Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="bg-texture"></div>

  <div id="app">

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M4 22C4 14 10 6 16 4C22 6 28 14 28 22C28 26 24 28 16 28C8 28 4 26 4 22Z" fill="currentColor" opacity="0.15"/>
            <path d="M16 4C16 4 10 10 10 18C10 22 12.5 25 16 26C19.5 25 22 22 22 18C22 10 16 4 16 4Z" fill="currentColor" opacity="0.4"/>
            <circle cx="16" cy="17" r="4" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-name">Padaria<span>Bot</span></h1>
          <p class="brand-sub">Assistente de Panificação</p>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <p class="sidebar-label">Acesso Rápido</p>

      <div class="quick-actions">
        <button class="quick-btn" type="button" data-msg="Receitas para dias quentes">
          <span class="quick-icon">☀️</span>
          <span>Dias quentes</span>
        </button>
        <button class="quick-btn" type="button" data-msg="Receitas para dias frios">
          <span class="quick-icon">❄️</span>
          <span>Dias frios</span>
        </button>
        <button class="quick-btn fermento-btn" type="button">
          <span class="quick-icon">🌡️</span>
          <span>Calcular fermento</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>Sistema ativo</span>
      </div>
    </aside>

    <main class="chat-area">

      <div class="chat-header">
        <div class="chat-header-info">
          <div class="avatar">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
              <path d="M16 4C16 4 10 10 10 18C10 22 12.5 25 16 26C19.5 25 22 22 22 18C22 10 16 4 16 4Z" fill="white" opacity="0.8"/>
              <circle cx="16" cy="17" r="4" fill="white"/>
            </svg>
          </div>
          <div>
            <p class="chat-title">Padaria-Bot</p>
            <p class="chat-online"><span class="pulse"></span> Online agora</p>
          </div>
        </div>
      </div>

      <div id="chat-box"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <input
            type="text"
            id="user-input"
            placeholder="Pergunte sobre receitas, ingredientes..."
            autocomplete="off"
          />
          <button id="send-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Pressione Enter para enviar</p>
      </div>

    </main>
  </div>


  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
